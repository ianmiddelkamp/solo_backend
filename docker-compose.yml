version: "3.9"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: invoice_dev
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  web:
    build:
      context: .
      args:
        BUNDLE_WITHOUT: ""
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails s -b 0.0.0.0"
    volumes:
      - .:/app
    working_dir: /app
    ports:
      - "3000:3000"
    depends_on:
      - db
      - redis
    environment:
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      RAILS_ENV: development
      RACK_ENV: development
      REDIS_URL: redis://redis:6379/0
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: invoice_dev
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      SOW_PROVIDER: ${SOW_PROVIDER:-}
      SOW_API_KEY: ${SOW_API_KEY:-}
      SOW_OLLAMA_HOST: ${SOW_OLLAMA_HOST:-http://ollama:11434}
      SOW_OLLAMA_MODEL: ${SOW_OLLAMA_MODEL:-phi3:mini}

  sidekiq:
    build:
      context: .
      args:
        BUNDLE_WITHOUT: ""
    command: bundle exec sidekiq -C config/sidekiq.yml
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - db
      - redis
    environment:
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      RAILS_ENV: development
      RACK_ENV: development
      REDIS_URL: redis://redis:6379/0
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: invoice_dev
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      SOW_PROVIDER: ${SOW_PROVIDER:-ollama}
      SOW_API_KEY: ${SOW_API_KEY:-}
      SOW_OLLAMA_HOST: ${SOW_OLLAMA_HOST:-http://ollama:11434}
      SOW_OLLAMA_MODEL: ${SOW_OLLAMA_MODEL:-phi3:mini}

volumes:
  db_data:
  ollama_data:
