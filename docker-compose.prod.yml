version: "3.9"
services:
  web:
    volumes:
      - storage_prod:/rails/storage
    environment:
      RAILS_ENV: production
      RACK_ENV: production
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      GMAIL_USER: ${GMAIL_USER}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD}

  sidekiq:
    volumes:
      - storage_prod:/rails/storage
    environment:
      RAILS_ENV: production
      RACK_ENV: production
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      GMAIL_USER: ${GMAIL_USER}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD}

volumes:
  storage_prod:
  ollama_data:
